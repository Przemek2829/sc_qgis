[plugin]
# Name of the plugin. This is the name of the directory that will
# be created in .qgis2/python/plugins
name: sc_qgis

# Full path to where you want your plugin directory copied. If empty,
# the QGIS default path will be used. Don't include the plugin name in
# the path.
plugin_path:

[files]
# Python  files that should be deployed with the plugin
python_files: __init__.py sc_qgis.py sc_qgis_dockwidget.py sc_add_connection_dialog.py sc_add_prefix_dialog.py sc_connections_dialog.py sc_connections_manager.py sc_export_layers_dialog.py sc_export_layers_manager.py sc_geom_variable_dialog.py sc_layers_manager.py sc_logger.py sc_logger_mode.py sc_messenger.py sc_names.py sc_prefix_db_dialog.py sc_prefixes_dialog.py sc_queries_dialog.py sc_query_manager.py sc_rdf_types_dialog.py sc_save_format_dialog.py sc_sparqlhighlighter.py sc_url_validator.py

# The main dialog file that is loaded (not compiled)
main_dialog: sc_qgis_dockwidget_base.ui sc_add_connection_dialog.ui sc_add_prefix_dialog.ui sc_connections_dialog.ui sc_export_layers_dialog.ui sc_geom_variable_dialog.ui sc_prefix_db_dialog.ui sc_prefixes_dialog.ui sc_queries_dialog.ui sc_rdf_types_dialog.ui sc_save_format_dialog.ui

# Other ui files for dialogs you create (these will be compiled)
compiled_ui_files: 

# Resource file(s) that will be compiled
resource_files: resources.qrc

# Other files required for the plugin
extras: metadata.txt icon.png

# Other directories to be deployed with the plugin.
# These must be subdirectories under the plugin directory
extra_dirs:

# ISO code(s) for any locales (translations), separated by spaces.
# Corresponding .ts files must exist in the i18n directory
locales:

[help]
# the built help directory that should be deployed with the plugin
dir: help/build/html
# the name of the directory to target in the deployed plugin 
target: help



